<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState } = React;
        function Modal({
            title,
            content,
            show = false,
            onClose = () => { },
            onConfirm = () => { }
        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        {content}
                        <div>
                             <button onClick={onClose}>Annulla</button>
                             <button onClick={onConfirm}>Conferma</button>
                        </div>
                       
                    </div>
                </div>,
                document.body
            )
        }
        const ReactApp = () => {
            const [animals, setAnimals] = useState([]);
            const [show, setShow] = useState();
            const [inputValue, setInputValue] = useState();

            function OpenModal() {
                 setShow(()=> true)
            }
            function AggiungeAnimale (){
                if(inputValue.trim()==="")return;

                setAnimals([...animals,inputValue]);
                setInputValue("")
                setShow(false);
            }

            return (
                <>
                    <button onClick={OpenModal}>Aggiungi animali</button>
                    <details>
                        <summary>Animali</summary>
                        <Modal 
                        title = "Aggiungi Animale"
                        show = {show}
                        content = {
                            <input
                            type= "text"
                            value = {inputValue}
                            onChange= {(e)=> setInputValue(e.target.value)}
                            placeHolder = "Scrivi un animale"/>
                        }
                        onClose = {()=> setShow(false)}
                        onConfirm = {AggiungeAnimale}
                        />
                        <ul>
                            {animals.map((a, index) => {
                                return (

                                    <li key={index}>{a}</li>

                                )
                            })}
                        </ul>
                    </details>
                </>

            )


        }
        const { createRoot } = ReactDOM;
        const elementoSpecifico = document.querySelector('.lista-animali');
        const root = createRoot(elementoSpecifico);
        root.render(<ReactApp />)
    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali">
            <!-- <details>
                <summary>Animali</summary>
                <p>cane</p>
            </details> -->
        </div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
